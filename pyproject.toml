[project]
name = "m-gsm-symbolic"
version = "0.0.1"
description = "Evaluating cross-lingual reasoning transfert"
readme = "README.md"
authors = [
    { name = "Kenneth Enevoldsen", email = "kennethcenevoldsen@gmail.com" },
    { name = "Nicolas Legrand", email = "nicolas.legrand@cas.au.dk" },
]
requires-python = ">=3.10,<3.13"
dependencies = [
    "ipykernel>=6.29.5",
    "torch",
    "unsloth",
    "vllm>=0.8.5",
    "wandb>=0.19.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.9.7",
    "ipykernel>=6.29.5",
    "pytest>=8.3.5",
]
